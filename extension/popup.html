<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400" />
  <title>WebDetector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="url(#shieldGrad)" opacity="0.2"/>
          <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" stroke="url(#shieldGrad)" stroke-width="1.5" fill="none"/>
          <path d="M9 12l2 2 4-4" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="shieldGrad" x1="3" y1="2" x2="21" y2="25"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#6366f1"/></linearGradient></defs>
        </svg>
        <span class="logo-text">WebDetector</span>
        <span class="version">v1.0</span>
      </div>
      <button id="rescanBtn" class="icon-btn" title="Re-scan this page">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
    </header>
    <div class="url-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/></svg>
      <span id="currentUrl" class="url-text">Loading...</span>
    </div>
    <div id="scanStatus" class="status-card">
      <div class="scanning-state" id="scanningState"><div class="spinner"></div><span>Analysing URL...</span></div>
    </div>
    <div id="verdictCard" class="verdict-card hidden">
      <div class="verdict-badge" id="verdictBadge">SAFE</div>
      <div class="verdict-meta">
        <span class="verdict-label" id="verdictLabel">benign</span>
        <span class="verdict-confidence" id="verdictConfidence">0%</span>
      </div>
      <div class="confidence-bar-track"><div class="confidence-bar-fill" id="confidenceBar"></div></div>
      <span class="analysis-time" id="analysisTime"></span>
    </div>
    <div id="probSection" class="section hidden">
      <div class="section-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        <span>Threat Breakdown</span>
      </div>
      <div id="probBars" class="prob-bars"></div>
    </div>
    <div id="featuresSection" class="section hidden">
      <button class="section-header collapsible" id="featuresToggle">
        <div style="display:flex;align-items:center;gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Detection Methods</span>
        </div>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div id="featuresContent" class="features-content collapsed">
        <div class="feature-group" id="lexicalGroup"><div class="feature-group-title">Lexical Analysis</div><div class="feature-items" id="lexicalItems"></div></div>
        <div class="feature-group" id="contentGroup"><div class="feature-group-title">Content Analysis</div><div class="feature-items" id="contentItems"></div></div>
        <div class="feature-group" id="domainGroup"><div class="feature-group-title">Domain Analysis</div><div class="feature-items" id="domainItems"></div></div>
      </div>
    </div>
    <div id="historySection" class="section">
      <button class="section-header collapsible" id="historyToggle">
        <div style="display:flex;align-items:center;gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span>Recent Scans</span>
        </div>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div id="historyContent" class="history-content collapsed"></div>
    </div>
    <div id="errorCard" class="error-card hidden">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <div><div class="error-title">Connection Error</div><div class="error-msg" id="errorMsg">Could not reach the WebDetector backend.</div></div>
    </div>
    <footer class="footer">
      <span>Powered by GNN AI</span>
      <span class="dot">·</span>
      <span id="backendStatus" class="backend-status offline">Backend offline</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
